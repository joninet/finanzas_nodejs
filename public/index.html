<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastos · Control Personal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">◈</span>
          <span class="logo-text">Gastos</span>
        </div>
        <button class="sidebar-close" id="sidebarClose">✕</button>
      </div>
      <ul class="nav-menu">
        <li><a href="#" class="nav-item active" data-page="resumen">
          <span class="nav-icon">◉</span><span>Resumen</span>
        </a></li>
        <li><a href="#" class="nav-item" data-page="gastos-diarios">
          <span class="nav-icon">◎</span><span>Gastos Diarios</span>
        </a></li>
        <li><a href="#" class="nav-item" data-page="gastos-fijos">
          <span class="nav-icon">◈</span><span>Gastos Fijos</span>
        </a></li>
        <li><a href="#" class="nav-item" data-page="cuentas">
          <span class="nav-icon">◇</span><span>Cuentas</span>
        </a></li>
        <li><a href="#" class="nav-item" data-page="tarjetas">
          <span class="nav-icon">▭</span><span>Tarjetas</span>
        </a></li>
        <li><a href="#" class="nav-item" data-page="categorias">
          <span class="nav-icon">◫</span><span>Categorías</span>
        </a></li>
      </ul>
    </nav>

    <!-- Main -->
    <div class="main-wrap">
      <header class="topbar">
        <button class="hamburger" id="hamburger">☰</button>
        <div class="topbar-title" id="pageTitle">Resumen</div>
        <div class="month-picker">
          <button class="btn-month" id="prevMonth">‹</button>
          <span id="monthLabel">cargando...</span>
          <button class="btn-month" id="nextMonth">›</button>
        </div>
      </header>

      <main class="page-content" id="pageContent">
        <!-- Rendered by JS -->
      </main>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Modal</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/pages/resumen.js"></script>
  <script src="/js/pages/gastos-diarios.js"></script>
  <script src="/js/pages/gastos-fijos.js"></script>
  <script src="/js/pages/cuentas.js"></script>
  <script src="/js/pages/tarjetas.js"></script>
  <script src="/js/pages/categorias.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
